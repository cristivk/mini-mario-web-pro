<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Mario Web Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mini Mario Web Pro 🕹️</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    <div id="hud">
        Nivel: <span id="level">1</span> | Puntaje: <span id="score">0</span>
    </div>
    <div id="menu">
        <button id="startBtn">Jugar</button>
        <button id="restartBtn" style="display:none;">Reiniciar</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
